<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>EventsWorld</h1>
      <p>Log in to access your events</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          placeholder="Enter your username"
          [class.error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
        />
        <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error-message">
          Username is required.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
          Password must be at least 6 characters.
        </div>
      </div>

      <div class="forgot-password">
        <a href="javascript:void(0)" (click)="onForgotPassword()">Forgot password?</a>
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="login-button">
        Login
      </button>

      <div class="signup-link">
        Don't have an account? <a href="javascript:void(0)" (click)="onSignUp()">Sign up</a>
      </div>
    </form>
  </div>
</div>
