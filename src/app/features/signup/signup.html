<div class="signup-container">
  <div class="signup-card">
    <div class="signup-header">
      <h1>Create Account</h1>
      <p>Join EventsWorld and discover unique experiences</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input
          type="text"
          id="fullName"
          formControlName="fullName"
          placeholder="Enter your full name"
          [class.error]="signupForm.get('fullName')?.invalid && signupForm.get('fullName')?.touched"
        />
        <div *ngIf="signupForm.get('fullName')?.invalid && signupForm.get('fullName')?.touched" class="error-message">
          Full Name is required.
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          [class.error]="signupForm.get('email')?.invalid && signupForm.get('email')?.touched"
        />
        <div *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched" class="error-message">
          A valid email is required.
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="Choose username"
            [class.error]="signupForm.get('username')?.invalid && signupForm.get('username')?.touched"
          />
          <div *ngIf="signupForm.get('username')?.invalid && signupForm.get('username')?.touched" class="error-message">
            At least 3 characters.
          </div>
        </div>

        <div class="form-group half">
          <label for="dateOfBirth">Date of Birth</label>
          <input
            type="date"
            id="dateOfBirth"
            formControlName="dateOfBirth"
            [class.error]="signupForm.get('dateOfBirth')?.invalid && signupForm.get('dateOfBirth')?.touched"
          />
          <div *ngIf="signupForm.get('dateOfBirth')?.invalid && signupForm.get('dateOfBirth')?.touched" class="error-message">
            Date is required.
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Create a strong password"
          [class.error]="signupForm.get('password')?.invalid && signupForm.get('password')?.touched"
        />
        <div *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched" class="error-message">
          Password must be at least 8 characters.
        </div>
      </div>

      <button type="submit" [disabled]="signupForm.invalid" class="signup-button">
        Sign Up
      </button>

      <div class="login-link">
        Already have an account? <a href="javascript:void(0)" (click)="onLogin()">Login</a>
      </div>
    </form>
  </div>
</div>
